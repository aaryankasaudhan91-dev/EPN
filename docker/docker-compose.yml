version: '3.9'

# ─── EPN Docker Compose ───────────────────────────────────────────────────────
# Orchestrates: PostgreSQL + Backend API + Frontend (Nginx)

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: epn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-epn_db}
      POSTGRES_USER: ${DB_USER:-epn_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-epn_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-epn_user} -d ${DB_NAME:-epn_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - epn-network

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: epn-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-epn_db}
      DB_USER: ${DB_USER:-epn_user}
      DB_PASSWORD: ${DB_PASSWORD:-epn_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DAILY_CONTENT_LIMIT: ${DAILY_CONTENT_LIMIT:-10}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    networks:
      - epn-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (React + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    container_name: epn-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - epn-network

  # ─── DB Migration + Seed (one-shot) ─────────────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: epn-migrate
    command: ["node", "src/db/migrate.js"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-epn_db}
      DB_USER: ${DB_USER:-epn_user}
      DB_PASSWORD: ${DB_PASSWORD:-epn_password}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - epn-network
    restart: "no"

volumes:
  postgres_data:
    driver: local

networks:
  epn-network:
    driver: bridge
